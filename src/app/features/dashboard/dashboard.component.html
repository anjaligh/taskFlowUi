<div class="container-fluid mx-0">
  <app-header [breadcrumbItems]="breadcrumbItems"></app-header>
  <div class="info-cards-section">
    <div class="row g-1">
      <div class="col-md-3 col-sm-4" *ngFor="let item of summaryCards; let isEven = even; trackBy: trackByTitle">
        <app-summary-card [title]="item.title" [percent]="item.percent" [isEven]="isEven" [count]="item.count" ></app-summary-card>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <app-circular-chart [chartLabels]="chartLabels" [chartSeries]="chartSeries" [chartColors]="chartColors"
            [chartType]="'donut'"></app-circular-chart>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <app-circular-chart [chartLabels]="categoryChartLabels" [chartSeries]="categoryChartSeries"
            [chartColors]="chartColors" [chartType]="'donut'"></app-circular-chart>
        </div>
      </div>

    </div>
  </div>
</div>
