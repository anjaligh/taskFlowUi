<div class="sidebar">
    <div class="logo-head">
        <img src="/assets/img/snow-logo.png" alt="logo" width="32" height="32">
        <span class="mb-0 ms-2">Task Flow</span>
    </div>
    <div class="menu-items">
        <a class="menu-item" [routerLink]="item.link" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}"
            *ngFor="let item of menuList">
            <i [class]="item.icon"></i>
            <span class="ms-3">{{item.title}}</span>
        </a>
    </div>
</div>
